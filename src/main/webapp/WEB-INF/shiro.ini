[main]
invalidRequest.blockNonAscii = false
cacheManager = org.apache.shiro.cache.MemoryConstrainedCacheManager
sessionManager = com.sonicle.webtop.core.app.shiro.WTContainerSessionManager
rememberMeManager = com.sonicle.webtop.core.app.shiro.WTCookieRememberMeManager
wtrealm = com.sonicle.webtop.core.app.shiro.WTRealm

securityManager.cacheManager = $cacheManager
securityManager.sessionManager = $sessionManager
securityManager.rememberMeManager = $rememberMeManager
securityManager.realms = $wtrealm

authc = com.sonicle.webtop.core.app.shiro.filter.AuthForm
authc.loginUrl = /login
authc.successUrl = /
authc.usernameParam = wtusername
authc.passwordParam = wtpassword
authc.rememberMeParam = wtrememberme
authc.failureKeyAttribute = loginFailure

[filters]
ldc = com.sonicle.webtop.core.app.shiro.filter.LoggerDC
rdump = com.sonicle.webtop.core.app.shiro.filter.RequestDumper
gzip = com.sonicle.webtop.core.app.shiro.filter.GZip
logout = com.sonicle.webtop.core.app.shiro.filter.Logout
loginDispatcher = com.sonicle.webtop.core.app.shiro.filter.LoginDispatcher
authrme = com.sonicle.webtop.core.app.shiro.filter.AuthRMe
csrfCheck = com.sonicle.webtop.core.app.shiro.filter.CSRFCheck
jwtSign = com.sonicle.webtop.core.app.shiro.filter.JWTSignatureVerifier
authBasic = com.sonicle.webtop.core.app.shiro.filter.AuthBasic
authBearer = com.sonicle.webtop.core.app.shiro.filter.AuthBearer

[urls]
/api/**/openapi** = ldc, noSessionCreation, anon
/api/** = ldc, noSessionCreation, authBearer[permissive], authBasic
/api-docs/** = ldc, noSessionCreation, anon
/doc-editor/** = ldc, rdump, noSessionCreation, jwtSign
/public/** = ldc, rdump, anon
/push/** = ldc, rdump, noSessionCreation, authc
/resources/** = ldc, noSessionCreation, anon
/service-request/** = gzip, ldc, rdump, authc, csrfCheck
/login/** = gzip, ldc, rdump, loginDispatcher, authrme, authc
/logout/** = rdump, logout
/** = gzip, ldc, rdump, authrme, authc
